# TITAN Daily Update Workflow
#
# Runs every day at 23:00 WIB (16:00 UTC) to:
#   1. Scrape Instagram accounts (incremental, 1-day window)
#   2. Scrape TikTok accounts (incremental, 1-day window)
#   3. Validate merged data (pre-flight check: 9 akun, ≥4000 posts, no cross-dup)
#   4. Generate src/data/accounts-full.json + public/data/accounts-full.json
#   5. Generate AI insights (optional, falls back to analytics-only if Worker fails)
#   6. Build Vite production bundle
#   7. Deploy to GitHub Pages (atomic: copy dist→root, commit, push)
#
# Sunday 23:00 WIB → full re-scrape (catch-up for any missed days).
# Other days → incremental 1-day window (fast + cheap).
#
# Can also be triggered manually via workflow_dispatch with custom inputs.
name: TITAN Daily Update

on:
  schedule:
    # 16:00 UTC = 23:00 WIB (Asia/Jakarta)
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to scrape'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - ig
          - tt
      force_full_scrape:
        description: 'Force full scrape (instead of incremental 1-day window)'
        required: false
        type: boolean
        default: false
      regenerate_ai:
        description: 'Force regenerate AI insights'
        required: false
        type: boolean
        default: false

concurrency:
  group: titan-daily-update
  cancel-in-progress: false

jobs:
  update:
    name: Scrape + Generate + Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: write   # git push for deploy
    env:
      # Fail loud on validation errors, fail soft on scrape errors
      FAIL_LATEST: true
      # V28: All scrapers are now FREE methods (i.instagram.com /clips/user/,
      # TikWM via Jina, Jina web profile for TT). No API key required.
      # The JINA_API_KEY and ENSEMBLEDATA_TOKENS below are kept for
      # backward-compat with the scraper wrappers (they read them but
      # don't use them anymore).
      JINA_API_KEY: ${{ secrets.TITAN_JINA_API_KEY }}
      ENSEMBLEDATA_TOKENS: ${{ secrets.TITAN_ENSEMBLEDATA_TOKEN }}
      # V27.16: kill switch. Now that V28 uses free methods, this is a
      # no-op (the wrapper just logs and continues). Kept for safety.
      ENSEMBLEDATA_TOKENS_SKIP: "true"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        # V27.11: Node 22 LTS. NO `cache:` — the only options are
        # 'npm' (needs package-lock.json), 'pnpm' (needs pnpm-lock.yaml
        # BUT pnpm isn't installed yet at this step), 'yarn' (needs
        # yarn.lock). We use pnpm, so we skip the setup-node cache and
        # let pnpm's own store cache + runner warm cache handle speed.
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm 9 (match lockfile v9)
        # V27.10: install via npm globally instead of corepack — the corepack
        # shim lives at a path that subsequent steps don't always inherit
        # on the GH runner, causing "Unable to locate executable file: pnpm"
        # even after `corepack prepare pnpm@9 --activate` succeeded.
        # npm-global install lands in /usr/local/bin which is on the default
        # PATH for every subsequent step.
        run: npm install -g pnpm@9.15.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # V27.12: Cold-start bootstrap. scripts/scraped/ is gitignored but the
      # commit step at the end tries to commit it. If a previous CI run
      # failed before commit, the runner starts with an empty scraped/ dir
      # → scrape-incremental has nothing to read → generate-data finds 0
      # files → post-write guard fails. Hydrate from the bundled
      # src/data/accounts-full.json (which IS committed) before scraping.
      - name: Bootstrap scraped/ from bundled data
        if: success()
        run: node scripts/bootstrap-scraped-from-bundled.mjs

      # ============== SCRAPE PHASE (fail soft) ==============

      # V26: smart cadence — Sunday = full re-scrape (weekly catch-up).
      # Other days = incremental 1-day window. Manual override via
      # workflow_dispatch input `force_full_scrape=true`.
      - name: Detect weekly catch-up day (Sunday UTC)
        id: cadence
        run: |
          day=$(date -u +%u)
          if [ "$day" = "7" ]; then
            echo "weekly_full=true" >> $GITHUB_OUTPUT
            echo "::notice::Sunday detected → weekly full re-scrape"
          else
            echo "weekly_full=false" >> $GITHUB_OUTPUT
            echo "::notice::Weekday ($day) → incremental 1-day scrape"
          fi

      - name: Scrape Instagram
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ig' || github.event.inputs.platform == '' }}
        env:
          JINA_API_KEY: ${{ secrets.TITAN_JINA_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force_full_scrape }}" = "true" ] || [ "${{ steps.cadence.outputs.weekly_full }}" = "true" ]; then
            echo "Full IG scrape (V28 free: i.instagram.com /clips/user/ + /feed/user/)"
            node scripts/scrape-ig.mjs --force
          else
            echo "Incremental IG scrape (V28 free, no --days needed)"
            node scripts/scrape-ig.mjs
          fi
        continue-on-error: true
        id: scrape-ig

      - name: Log IG scrape result
        if: always() && steps.scrape-ig.outcome != 'skipped'
        run: |
          echo "::notice::IG scrape outcome=${{ steps.scrape-ig.outcome }}"

      - name: Scrape TikTok
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'tt' || github.event.inputs.platform == '' }}
        env:
          JINA_API_KEY: ${{ secrets.TITAN_JINA_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force_full_scrape }}" = "true" ] || [ "${{ steps.cadence.outputs.weekly_full }}" = "true" ]; then
            echo "Full TT scrape (V28 free: Jina web profile + TikWM search via Jina)"
            node scripts/scrape-tt.mjs --force
          else
            echo "Incremental TT scrape (V28 free, no --days needed)"
            node scripts/scrape-tt.mjs
          fi
        continue-on-error: true
        id: scrape-tt

      - name: Log TT scrape result
        if: always() && steps.scrape-tt.outcome != 'skipped'
        run: |
          echo "::notice::TT scrape outcome=${{ steps.scrape-tt.outcome }}"

      # ============== VALIDATION PHASE (fail loud) ==============

      - name: Validate merged data (pre-flight)
        run: |
          echo "==================================="
          echo "Pre-flight validation"
          echo "==================================="
          node scripts/validate-merge.mjs
          if [ $? -ne 0 ]; then
            echo "::error::Pre-flight validation FAILED — aborting deploy"
            exit 1
          fi
          echo "::notice::Pre-flight validation passed"

      # ============== GENERATE PHASE (fail loud) ==============

      - name: Generate accounts-full.json
        run: node scripts/generate-data.mjs

      - name: Generate AI insights (optional, fail soft)
        env:
          VITE_LLM_PROXY_URL: ${{ secrets.LLM_PROXY_URL }}
        run: |
          if [ "${{ github.event.inputs.regenerate_ai }}" = "true" ]; then
            echo "Force regenerate AI insights"
            pnpm insights:generate
          else
            echo "Generate AI insights (continue on error)"
            pnpm insights:generate || echo "::warning::AI insights generation failed — continuing with analytics-only mode"
          fi

      # ============== BUILD PHASE ==============

      # V28.1: VITE_LLM_PROXY_URL is PUBLIC (the Worker URL is bundled into
      # the client, not a secret). Bake it into the build so the live site
      # chat panel auto-connects to the Worker instead of falling back to
      # direct mode (which requires API keys in localStorage). Without
      # this, every GitHub Actions deploy produces a bundle that asks the
      # user to enter a Google/OpenRouter API key.
      - name: Build production bundle
        env:
          VITE_LLM_PROXY_URL: https://titan-llm-proxy.nickasad10007.workers.dev
        run: pnpm run build

      # ============== DEPLOY PHASE ==============

      - name: Configure git for deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GH_TOKEN="$GH_TOKEN" pnpm run deploy
          if [ $? -ne 0 ]; then
            echo "::error::Deploy failed"
            exit 1
          fi
          echo "::notice::Deploy complete — https://tltanpro.github.io/TITAN/"

      # ============== NOTIFY (always run, even on partial failure) ==============

      - name: Summary
        if: always()
        run: |
          echo "==================================="
          echo "TITAN Daily Update Summary"
          echo "==================================="
          echo "Date: $(date -u)"
          echo "Cadence: ${{ steps.cadence.outputs.weekly_full == 'true' && 'weekly full re-scrape' || 'incremental 1-day' }}"
          echo "IG scrape: ${{ steps.scrape-ig.outcome }}"
          echo "TT scrape: ${{ steps.scrape-tt.outcome }}"
          echo "Build outcome: ${{ steps.build.outcome }}"
          echo "==================================="
