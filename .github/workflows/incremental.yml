# TITAN incremental scraper — runs daily at 16:00 UTC = 23:00 WIB
#
# Cron: '0 16 * * *' → 16:00 UTC = 23:00 WIB
# Why 23:00 WIB: outside ENSEMBLEDATA/Jina rate-limit peak hours; finished
# before staff check the dashboard at 06:00 WIB the next morning.
#
# V16: also re-scrapes 9 profile avatars (assets/avatars/*) via the
# `facebookexternalhit/1.1` UA. URLs valid 1-2 days; daily refresh keeps
# the dashboard showing real profile photos instead of brand-icon tiles.
#
# Required GitHub repo Secrets:
#   - GH_PAT (Personal Access Token with `workflow` scope, for git push)
#   - TITAN_ENSEMBLEDATA_TOKEN, TITAN_JINA_API_KEY (scraper API tokens)
#   - (Optional) TITAN_GH_REPO, TITAN_GH_OWNER for self-reference
#
# Behavior:
#   1. Checkout (with PAT auth so we can push back)
#   2. Setup Node 20
#   3. Run scrape-incremental.mjs (only fetches posts newer than latestTimestamp)
#   4. Run scrape-avatars.mjs (re-scrape 9 profile photos via facebookexternalhit)
#   5. Run validate-merge.mjs (dedup, sanity check)
#   6. Run generate-data.mjs (regenerate accounts-full.json + analytics)
#   7. If anything changed → git add + commit + push
#   8. If no changes → exit early (saves CI minutes)
#
# Cost: ~20 /media/info calls + 9 og:image fetches per day
#       (vs ~1500 for full-scrape). 99% savings.

name: TITAN Incremental Refresh

on:
  schedule:
    - cron: '0 16 * * *' # 16:00 UTC = 23:00 WIB
  workflow_dispatch:       # manual trigger from GH UI
    inputs:
      platform:
        description: 'Platform to scrape'
        required: false
        default: 'all'
        type: choice
        options: [all, ig, tt]
      days:
        description: 'Lookback window in days'
        required: false
        default: '7'
      prune:
        description: 'Prune posts older than window'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write  # needed for git push

jobs:
  incremental:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # GH PAT (set in repo Secrets → Actions → New repository secret)
      GH_PAT: ${{ secrets.GH_PAT }}
      # Scraper API keys (also Secrets)
      TITAN_ENSEMBLEDATA_TOKEN: ${{ secrets.TITAN_ENSEMBLEDATA_TOKEN }}
      TITAN_JINA_API_KEY: ${{ secrets.TITAN_JINA_API_KEY }}
    steps:
      - name: Checkout repo (with PAT)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        # V27.11: Node 22 LTS. NO `cache:` — the only options are
        # 'npm' (needs package-lock.json), 'pnpm' (needs pnpm-lock.yaml
        # BUT pnpm isn't installed yet at this step), 'yarn' (needs
        # yarn.lock). We use pnpm, so we skip the setup-node cache and
        # let pnpm's own store cache + runner warm cache handle speed.
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm 9 (match lockfile v9)
        # V27.10: install via npm globally instead of corepack — the corepack
        # shim lives at a path that subsequent steps don't always inherit
        # on the GH runner, causing "Unable to locate executable file: pnpm"
        # even after `corepack prepare pnpm@9 --activate` succeeded.
        # npm-global install lands in /usr/local/bin which is on the default
        # PATH for every subsequent step.
        run: npm install -g pnpm@9.15.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # V27.12: Cold-start bootstrap. scripts/scraped/ is gitignored but the
      # commit step at the end tries to commit it. If a previous CI run
      # failed before commit, the runner starts with an empty scraped/ dir
      # → scrape-incremental has nothing to read → generate-data finds 0
      # files → post-write guard fails. Hydrate from the bundled
      # src/data/accounts-full.json (which IS committed) before scraping.
      - name: Bootstrap scraped/ from bundled data
        if: success()
        run: node scripts/bootstrap-scraped-from-bundled.mjs

      - name: Run incremental scraper
        id: scrape
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"
          DAYS="${{ inputs.days || '7' }}"
          PRUNE="${{ inputs.prune || 'false' }}"
          echo "Platform=$PLATFORM days=$DAYS prune=$PRUNE"
          node scripts/scrape-incremental.mjs --platform=$PLATFORM --days=$DAYS $([ "$PRUNE" = "true" ] && echo "--prune")
        continue-on-error: false

      # V16: re-scrape 9 profile avatars via facebookexternalhit/1.1 UA.
      # Keeps `oe`/`x-expires` fresh (URLs valid 1-2 days) so dashboard
      # always shows real profile photos, not brand-icon tiles.
      - name: Scrape fresh avatars
        if: success()
        run: node scripts/scrape-avatars.mjs

      - name: Validate and merge
        if: success()
        run: node scripts/validate-merge.mjs

      - name: Regenerate data
        if: success()
        run: node scripts/generate-data.mjs

      - name: Check for changes
        id: changes
        if: success()
        run: |
          # V16: also detect avatar file changes (assets/avatars/*.jpg|webp|jpeg)
          if git diff --quiet HEAD -- src/data/accounts-full.json scripts/scraped/ assets/avatars/ 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data or avatar changes — skipping commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data or avatars changed — will commit"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "titan-bot"
          git config user.email "titan-bot@users.noreply.github.com"
          git add src/data/accounts-full.json scripts/scraped/ assets/avatars/
          NEW=$(git diff --cached --numstat | wc -l)
          git commit -m "chore(data+avatar): incremental refresh $(date -u +%Y-%m-%dT%H:%M:%SZ) — $NEW files changed"
          git push

      - name: Summary
        if: always()
        run: |
          echo "### Incremental refresh summary" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time (UTC): $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- Changed: ${{ steps.changes.outputs.changed || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "- Files updated: \`accounts-full.json\` + scraped JSONs + assets/avatars/" >> $GITHUB_STEP_SUMMARY
          fi
